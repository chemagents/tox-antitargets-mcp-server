services:
  tox-antitargets-mcp-server:
    build: .
    container_name: tox-antitargets-mcp-server
    ports:
      - "7335:7331"          # host 7335 -> container 7331 (/mcp)
    restart: unless-stopped
    # Runs with no configuration. To tune it (S3 figure storage, thresholds), pass
    # TOX_* variables via an `environment:` block.
