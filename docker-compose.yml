services:
  tox-antitargets-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tox-antitargets-mcp-server
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "7335:7331"   # host 7335 -> container 7331 (matches the CoScientist stack)
    restart: unless-stopped
